<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servidor de Reseñas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <header class="p-3 bg-white shadow-sm mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <img src="/assets/TLRN_logo.png" width="150" height="75" alt="Logo">
            <nav class="d-flex gap-2">
                <a href="login.html" class="btn btn-outline-success">Iniciar sesión</a>
                <a href="regristro.html" class="btn btn-success">Registrarse</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="text-center mb-5">
            <h1 class="fw-bold">Reseñas de la Comunidad</h1>
            <p class="lead text-muted">Explora mas reseñas disponibles en nuestro catalogo completo iniciando sesion.</p>
            
            <div id="preview" class="row g-4 mt-4 text-start">
                <div class="col-12 text-center mensaje-espera">
                    <h3>Reseñas en Preview</h3>
                    <p>El contenido detallado de las reseñas se cargará aquí...</p>
                    <div class="spinner-border text-success" role="status"></div>
                </div>
            </div>
        </section>
    </main>

    <footer>
    </footer>

    <script src="js/preview.js"></script>
    <script src="js/resena_ver.js"></script>
</body>
</html>
