<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador de Reseñas - TLRN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style_admin.css">
</head>
<body>

    <aside class="sidebar shadow-sm">
        <div class="text-center mb-4">
            <img src="/assets/TLRN_logo.png" width="130" alt="Logo Telemática" class="mb-2">
            <h6 class="text-muted small fw-bold text-uppercase mt-2">Gestión de Contenido</h6>
        </div>
        <nav class="nav nav-pills flex-column">
            <a href="nueva reseña.html" class="nav-link">
                <i class="bi bi-file-earmark-plus"></i> Publicar Reseña
            </a>
            <a href="editar reseña.html" class="nav-link">
                <i class="bi bi-pencil-square"></i> Editar Existentes
            </a>
            <a href="borrar reseña.html" class="nav-link text-danger">
                <i class="bi bi-trash3"></i> Eliminar Reseña
            </a>
        </nav>
        <a href="cerrar sesion.html" class="btn btn-logout d-flex align-items-center justify-content-center gap-2 mt-auto py-2 rounded-3 text-decoration-none">
            <i class="bi bi-box-arrow-left"></i> Salir del Panel
        </a>
        <button type="button" id="logout">cerrar sesion</button>
    </aside>

    <main class="main-content">
        <div class="container-fluid">
            <header class="mb-4">
                <h2 class="fw-bold text-dark">Panel de Administración</h2>
                <p class="text-muted">Visualización y control de reseñas publicadas.</p>
            </header>

            <section class="card card-preview p-4">
                <div id="preview_usuarios">
                    <div class="text-center py-5">
                        <div class="spinner-border text-success opacity-50" role="status"></div>
                        <p class="mt-3 text-muted fw-medium">Obteniendo reseñas del servidor...</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="js/preview_usuarios.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/logout.js"></script>
    <footer>
    </footer>
</body>
</html>
