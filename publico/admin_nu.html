<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Usuario - TLRN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column vh-100">

    <header class="p-3 bg-white shadow-sm">
        <div class="container text-center text-md-start">
            <a href="admin_panel.html">
                <img src="/assets/TLRN_logo.png" width="150" height="75" alt="Logo" class="img-fluid">
            </a>
        </div>
    </header>

    <main class="container d-flex flex-grow-1 justify-content-center align-items-center my-4">
        <div class="row w-100 justify-content-center">
            <div class="col-11 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                
                <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5 bg-white">
                    <form id="form_nu" name="form_n-e">
                        <h1 class="h3 mb-4 fw-bold text-center text-uppercase text-dark">
                            Crear Nuevo Usuario
                        </h1>
                        
                        <div class="mb-3">
                            <label class="form-label small fw-semibold text-secondary">Nombre de usuario:</label>
                            <input type="text" name="UN" class="form-control bg-light border-0 shadow-sm" placeholder="Ej. JesusAlberto" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-semibold text-secondary">Email del usuario:</label>
                            <input type="email" name="EM" class="form-control bg-light border-0 shadow-sm" placeholder="ejemplo@ucol.mx" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-semibold text-secondary">Contraseña:</label>
                            <input type="password" name="PW" class="form-control bg-light border-0 shadow-sm" placeholder="••••••••" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label small fw-semibold text-secondary d-block mb-2">Rango del usuario:</label>
                            
                            <div class="d-flex flex-wrap gap-3 p-2 bg-light rounded-3 shadow-sm border">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" id="opc1" name="RK" value="user" checked>
                                    <label class="form-check-label small" for="opc1">Usuario</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" id="opc2" name="RK" value="resen">
                                    <label class="form-check-label small" for="opc2">Reseñista</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" id="opc3" name="RK" value="admin">
                                    <label class="form-check-label small" for="opc3">Administrador</label>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success btn-lg shadow-sm text-uppercase fw-bold py-3">
                                Registrar Usuario
                            </button>
                            <a href="admin.html" class="btn btn-outline-secondary">Volver al Panel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-3 text-center text-muted">
        <small>&copy; 2026 Facultad de Telemática</small>
    </footer>

    <script src="js/sanitizador.js"></script>
    <script type="module" src="js/admin_nu.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
